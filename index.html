<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🦈</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, #0a0a0a 0%, #000 75%);
  }
  .spinner {
    width: 64px; height: 64px; border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.12);
    border-top-color: #ffffff;
    box-shadow: 0 0 18px rgba(255,255,255,0.85), 0 0 42px rgba(255,255,255,0.4);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="spinner"></div>

<script>

  const params  = new URLSearchParams(window.location.search);
  const placeId = params.get("placeId");
  const jobId   = params.get("jobId");

  function launch() {
    if (placeId && jobId) {
      window.location.href = `roblox://placeId=${placeId}&gameInstanceId=${jobId}`;
      setTimeout(() => {
        window.close();  
        window.open("", "_self").close();
        window.location.href = "about:blank"; 
      }, 1500);
    }
  }

  window.addEventListener("load", () => {
    setTimeout(launch, 1100);
  });
</script>
</body>
</html>
