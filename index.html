<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🦈 Shark Join</title>
<style>
  :root { --blue: #4F6D8C; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 30%, #5d7ea3 0%, #34455a 70%, #222d3a 100%);
    font-family: "Segoe UI", system-ui, sans-serif;
    color: #eef2f7; text-align: center; padding: 24px;
  }
  .card {
    background: rgba(20,28,38,0.85);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px; padding: 40px 32px; max-width: 460px; width: 100%;
    box-shadow: 0 18px 60px rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
  }
  h1 { font-size: 2rem; margin: 0 0 6px; }
  .sub { color: #aab8c8; margin: 0 0 26px; font-size: 0.95rem; }
  .info { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px 16px; margin: 0 0 24px; font-size: 0.9rem; text-align: left; }
  .info div { margin: 4px 0; }
  .info b { color: var(--blue-light, #8fb4dd); }
  .jobid { font-family: monospace; font-size: 0.8rem; word-break: break-all; color: #9fb3c8; }
  button {
    background: var(--blue); color: #fff; border: none;
    border-radius: 12px; padding: 16px 22px; font-size: 1.1rem; font-weight: 700;
    cursor: pointer; width: 100%; transition: transform .08s ease, filter .15s ease;
  }
  button:hover { filter: brightness(1.12); }
  button:active { transform: scale(0.98); }
  .status { margin-top: 18px; font-size: 0.85rem; color: #aab8c8; min-height: 1.2em; }
  .err { color: #ff8a8a; }
  details { margin-top: 22px; text-align: left; }
  summary { cursor: pointer; color: #aab8c8; font-size: 0.85rem; }
  pre { background: #0e141c; border-radius: 10px; padding: 12px; overflow-x: auto; font-size: 0.72rem; color: #cfe0f2; }

  /* Loading screen: black gradient overlay with a glowing white spinner. */
  #loader {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, #0a0a0a 0%, #000 75%);
    transition: opacity .5s ease;
  }
  #loader.hide { opacity: 0; pointer-events: none; }
  .spinner {
    width: 64px; height: 64px; border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.12);
    border-top-color: #ffffff;
    box-shadow: 0 0 18px rgba(255,255,255,0.85), 0 0 42px rgba(255,255,255,0.4);
    animation: spin 0.9s linear infinite;
  }
  .loadtext {
    margin-top: 24px; font-family: "Segoe UI", system-ui, sans-serif;
    color: #fff; font-size: 1rem; letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(255,255,255,0.9), 0 0 28px rgba(255,255,255,0.5);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }
</style>
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
  </div>

  <div class="card">
    <h1>🦈 Shark Join</h1>
    <p class="sub">Launching you into the server…</p>

    <div class="info">
      <div><b>Place:</b> <span id="place">—</span></div>
      <div><b>Server:</b> <span id="job" class="jobid">—</span></div>
    </div>

    <button id="joinBtn">🚀 Open Roblox &amp; Join Server</button>
    <div class="status" id="status"></div>

    <details>
      <summary>Not working? Use executor instead</summary>
      <pre id="exec">—</pre>
    </details>
  </div>

<script>
  // Read placeId + jobId from the URL query (?placeId=..&jobId=..).
  const params = new URLSearchParams(window.location.search);
  const placeId = params.get("placeId");
  const jobId   = params.get("jobId");

  const placeEl  = document.getElementById("place");
  const jobEl    = document.getElementById("job");
  const statusEl = document.getElementById("status");
  const execEl   = document.getElementById("exec");
  const btn      = document.getElementById("joinBtn");

  placeEl.textContent = placeId || "(missing)";
  jobEl.textContent   = jobId   || "(missing)";

  // Executor fallback snippet.
  if (placeId && jobId) {
    execEl.textContent =
      `game:GetService('TeleportService'):TeleportToPlaceInstance(${placeId}, '${jobId}', game.Players.LocalPlayer)`;
  }

  // Build the native Roblox deep link. The roblox:// protocol with
  // placeId + gameInstanceId joins a SPECIFIC server instance — this is the one
  // thing that works without any browser extension, and a webpage CAN fire it.
  function buildDeepLink() {
    return `roblox://placeId=${placeId}&gameInstanceId=${jobId}`;
  }

  function launch() {
    if (!placeId || !jobId) {
      statusEl.innerHTML = '<span class="err">Missing placeId or jobId in the link.</span>';
      return;
    }
    statusEl.textContent = "Opening Roblox…";
    // Firing the protocol navigates the browser, which hands off to the Roblox client.
    window.location.href = buildDeepLink();
    setTimeout(() => {
      statusEl.textContent = "If Roblox didn't open, click the button again.";
    }, 2500);
  }

  btn.addEventListener("click", launch);

  // Try once automatically on load (some browsers allow it; if blocked, the
  // user clicks the button — a real user gesture always lets the protocol fire).
  const loader = document.getElementById("loader");
  function hideLoader() {
    loader.classList.add("hide");
    setTimeout(() => { loader.style.display = "none"; }, 550);
  }

  window.addEventListener("load", () => {
    if (placeId && jobId) {
      // hold the loading screen briefly, then fire the launch and reveal the card
      setTimeout(() => {
        launch();
        hideLoader();
      }, 1100);
    } else {
      hideLoader();
      statusEl.innerHTML = '<span class="err">This link is missing server info.</span>';
    }
  });
</script>
</body>
</html>
